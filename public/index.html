<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Manager</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="/manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <meta name="theme-color" content="#1a73e8">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
</head>
<body>

  <!-- Main app -->
  <div id="app">

    <header>
      <div class="header-left">
        <span class="app-title">Task Manager</span>
      </div>
      <div class="header-right">
        <button id="btn-quick-capture" class="btn btn-secondary">+ Quick Capture</button>
        <button id="btn-reload" class="btn btn-outline">Reload</button>
      </div>
    </header>

    <nav id="tab-nav"></nav>

    <main id="main-content">
      <div class="loading">Loading...</div>
    </main>

  </div>

  <!-- Modal: Quick Capture -->
  <div id="modal-capture" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-backdrop"></div>
    <div class="modal-box">
      <h2>Quick Capture</h2>
      <input type="text" id="capture-name" placeholder="What's on your mind?" autocomplete="off">
      <textarea id="capture-notes" placeholder="Notes (optional)" rows="3"></textarea>
      <div class="modal-actions">
        <button class="btn btn-ghost modal-cancel" data-modal="modal-capture">Cancel</button>
        <button id="capture-save" class="btn btn-primary">Save to Inbox</button>
      </div>
    </div>
  </div>

  <!-- Modal: Add / Edit Status -->
  <div id="modal-status" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-backdrop"></div>
    <div class="modal-box modal-small">
      <h2>Update Status</h2>
      <select id="status-value">
        <option value="Inbox">Inbox</option>
        <option value="To Do">To Do</option>
        <option value="In Progress">In Progress</option>
        <option value="Blocked">Blocked</option>
        <option value="Done">Done</option>
      </select>
      <div class="modal-actions">
        <button class="btn btn-ghost modal-cancel" data-modal="modal-status">Cancel</button>
        <button id="status-save" class="btn btn-primary">Save</button>
      </div>
    </div>
  </div>

  <!-- Modal: Edit Notes -->
  <div id="modal-notes" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-backdrop"></div>
    <div class="modal-box">
      <h2>Notes</h2>
      <textarea id="notes-value" rows="6" placeholder="Add notes..."></textarea>
      <div class="modal-actions">
        <button class="btn btn-ghost modal-cancel" data-modal="modal-notes">Cancel</button>
        <button id="notes-save" class="btn btn-primary">Save</button>
      </div>
    </div>
  </div>

  <!-- Modal: Add Project -->
  <div id="modal-project" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-backdrop"></div>
    <div class="modal-box">
      <h2>New Project</h2>
      <input type="text" id="project-name" placeholder="Project name" autocomplete="off">
      <div class="form-row">
        <select id="project-status">
          <option value="To Do">To Do</option>
          <option value="In Progress">In Progress</option>
          <option value="Blocked">Blocked</option>
        </select>
        <select id="project-priority">
          <option value="Medium">Medium</option>
          <option value="Low">Low</option>
          <option value="High">High</option>
          <option value="Urgent">Urgent</option>
        </select>
      </div>
      <textarea id="project-notes" placeholder="Notes (optional)" rows="3"></textarea>
      <div class="modal-actions">
        <button class="btn btn-ghost modal-cancel" data-modal="modal-project">Cancel</button>
        <button id="project-save" class="btn btn-primary">Create Project</button>
      </div>
    </div>
  </div>

  <!-- Modal: Add Task -->
  <div id="modal-task" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-backdrop"></div>
    <div class="modal-box">
      <h2>New Task</h2>
      <div class="modal-context" id="task-context-label"></div>
      <input type="text" id="task-name" placeholder="Task name" autocomplete="off">
      <select id="task-status">
        <option value="To Do">To Do</option>
        <option value="In Progress">In Progress</option>
        <option value="Blocked">Blocked</option>
      </select>
      <input type="date" id="task-execution-date" placeholder="Execution date (optional)">
      <textarea id="task-notes" placeholder="Notes (optional)" rows="3"></textarea>
      <div class="modal-actions">
        <button class="btn btn-ghost modal-cancel" data-modal="modal-task">Cancel</button>
        <button id="task-save" class="btn btn-primary">Add Task</button>
      </div>
    </div>
  </div>

  <!-- Modal: Task Detail -->
  <div id="modal-task-detail" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-backdrop"></div>
    <div class="modal-box modal-detail">
      <h2>Task Detail</h2>
      <div class="detail-grid">
        <div class="detail-field detail-full">
          <label>Name</label>
          <input type="text" id="detail-name" autocomplete="off">
        </div>
        <div class="detail-field">
          <label>Status</label>
          <select id="detail-status">
            <option value="Inbox">Inbox</option>
            <option value="To Do">To Do</option>
            <option value="In Progress">In Progress</option>
            <option value="Blocked">Blocked</option>
            <option value="Done">Done</option>
          </select>
        </div>
        <div class="detail-field">
          <label>Priority</label>
          <select id="detail-priority">
            <option value="Low">Low</option>
            <option value="Medium">Medium</option>
            <option value="High">High</option>
            <option value="Urgent">Urgent</option>
          </select>
        </div>
        <div class="detail-field">
          <label>Due Date</label>
          <input type="date" id="detail-due-date">
        </div>
        <div class="detail-field">
          <label>Execution Date</label>
          <input type="date" id="detail-execution-date">
        </div>
        <div class="detail-field">
          <label>Execution Time</label>
          <div class="tc-wrap" id="tc-exec-time">
            <div class="tc-unit">
              <button type="button" class="tc-btn" data-tc="exec-time" data-part="h" data-dir="1">▲</button>
              <span class="tc-val" id="tc-exec-time-h">--</span>
              <button type="button" class="tc-btn" data-tc="exec-time" data-part="h" data-dir="-1">▼</button>
            </div>
            <span class="tc-colon">:</span>
            <div class="tc-unit">
              <button type="button" class="tc-btn" data-tc="exec-time" data-part="m" data-dir="1">▲</button>
              <span class="tc-val" id="tc-exec-time-m">--</span>
              <button type="button" class="tc-btn" data-tc="exec-time" data-part="m" data-dir="-1">▼</button>
            </div>
            <button type="button" class="tc-clear-btn" data-tc="exec-time">&#x2715;</button>
          </div>
          <input type="hidden" id="detail-execution-time">
        </div>
        <div class="detail-field">
          <label>Estimated Duration</label>
          <div class="tc-wrap" id="tc-duration">
            <div class="tc-unit">
              <button type="button" class="tc-btn" data-tc="duration" data-part="h" data-dir="1">▲</button>
              <span class="tc-val" id="tc-duration-h">0</span>
              <button type="button" class="tc-btn" data-tc="duration" data-part="h" data-dir="-1">▼</button>
              <span class="tc-unit-lbl">h</span>
            </div>
            <div class="tc-unit">
              <button type="button" class="tc-btn" data-tc="duration" data-part="m" data-dir="1">▲</button>
              <span class="tc-val" id="tc-duration-m">00</span>
              <button type="button" class="tc-btn" data-tc="duration" data-part="m" data-dir="-1">▼</button>
              <span class="tc-unit-lbl">m</span>
            </div>
            <button type="button" class="tc-clear-btn" data-tc="duration">&#x2715;</button>
          </div>
          <input type="hidden" id="detail-duration">
        </div>
        <div class="detail-field detail-full">
          <label>External Link</label>
          <input type="url" id="detail-external-link" placeholder="https://...">
        </div>
        <div class="detail-field detail-full">
          <label>Notes</label>
          <textarea id="detail-notes" rows="5" placeholder="Add notes..."></textarea>
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn btn-ghost modal-cancel" data-modal="modal-task-detail">Cancel</button>
        <button id="detail-save" class="btn btn-primary">Save</button>
      </div>
    </div>
  </div>

  <!-- Bottom app nav -->
  <nav id="bottom-nav">
    <button class="bottom-tab-btn active" data-app-tab="tasks">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M3 3h8v8H3V3zm10 0h8v8h-8V3zM3 13h8v8H3v-8zm10 0h8v8h-8v-8z"/></svg>
      <span>TASKS</span>
    </button>
    <button class="bottom-tab-btn" data-app-tab="health">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
      <span>HEALTH</span>
    </button>
    <button class="bottom-tab-btn" data-app-tab="finance">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M20 4H4c-1.11 0-2 .89-2 2v12c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V6c0-1.11-.89-2-2-2zm0 14H4v-6h16v6zm0-10H4V6h16v2z"/></svg>
      <span>FINANCE</span>
    </button>
    <button class="bottom-tab-btn" data-app-tab="grocery">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M7 18c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59L5.25 14c-.16.28-.25.61-.25.96C5 16.1 5.9 17 7 17h13v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63H19c.75 0 1.41-.41 1.75-1.03l3.58-6.49A1 1 0 0023.46 4H5.21l-.94-2H1zm16 16c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg>
      <span>GROCERY</span>
    </button>
  </nav>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.6/Sortable.min.js"></script>
  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }
  </script>
</body>
</html>
